<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Request</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fce4ec 0%, #ffebee 100%);
            font-family: sans-serif;
            overflow: hidden;
            text-align: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #d81b60;
            margin-bottom: 30px;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            height: 100px;
            position: relative;
        }
        button {
            padding: 12px 35px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 50px;
            border: none;
            transition: all 0.2s ease;
            font-weight: bold;
        }
        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }
        #noBtn {
            background-color: #9e9e9e;
            color: white;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Will you go on a date with me? 🌹</h1>
        <div class="btn-container">
            <button id="yesBtn" onclick="celebrate()">Yes</button>
            <button id="noBtn" onmouseover="moveButton()" ontouchstart="moveButton()">No</button>
        </div>
    </div>

    <script>
        function moveButton() {
            const btn = document.getElementById('noBtn');
            
            const x = Math.random() * (window.innerWidth - btn.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight - 20);

            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function celebrate() {
            document.querySelector('.card').innerHTML = "<h1>I knew it! 😍❤️</h1><p style='font-size: 20px; color: #d81b60;'>Iam kidding just trying to make you smile!</p>";
            document.body.style.backgroundColor = "#ffc1e3";
        }
    </script>

</body>
</html>
